# Phase 181 — evolution environment (non-conflicting ports; paper research enabled)
server.port=8180
spring.application.name=trading-signal-backend-evolution

# Paper execution research (NOT live auto-trading)
paper-execution.research.enabled=true
paper-execution.fixed-quantity=1
paper-execution.order-type=MKT
paper-execution.exit-poll-ms=8000
paper-execution.dedupe-minutes=30

# Phase 210 — paper execution intelligence (simulated fills; no IBKR order placement)
paper-execution.intelligence-enabled=true
paper-execution.simulated-fills-only=true

# IBKR: startup auto-detects Gateway (4002) vs TWS (7497). Override: IBKR_PORT=4002
ibkr.port=7497
# Unique client id per JVM (base 10 + pid%50); avoids Gateway error 326 when multiple backends run
ibkr.clientId=10
ibkr.client-id-auto-offset=true
# Concurrent live tick streams (watchlist may be larger; scanner uses DB/historical for the rest)
ibkr.max-live-streams=40

# Phase 194 — dynamic realtime allocation (replaces static subscribeLive batch)
ibkr.stream.dynamic-enabled=true
ibkr.stream.dominance-realtime-threshold=130
ibkr.stream.scanner-top-realtime-slots=8
ibkr.stream.max-snapshot-symbols=30
ibkr.stream.snapshot-interval-ms=30000
ibkr.stream.reconcile-interval-ms=30000
ibkr.stream.inactive-dormant-minutes=45
ibkr.stream.verify-timeout-seconds=10
ibkr.stream.stale-seconds=60
ibkr.stream.dead-seconds=120
ibkr.stream.auto-recover=true

# Phase 217 — TradingView webhook bridge (intelligence only, no execution)
tradingview.stale-minutes=15
tradingview.throttle-seconds=60
tradingview.max-stored-signals=500
tradingview.top-list-size=12
# tradingview.webhook-secret=your-shared-secret
# 1=live (requires IBKR live API subscriptions); 3=delayed ~15–20m
# TWS: Global Configuration → API → Enable delayed market data (required for type 3)
# Error 10168 = no entitlement — use type 3 + enable delayed, or add live subs
ibkr.market-data-type=3

# Phase 188 — live trader execution safety
live-trader.safety.max-daily-loss-r=3.0
live-trader.safety.max-consecutive-losses=4
live-trader.safety.max-open-positions=3
live-trader.safety.max-probes-per-hour=12

# Phase 189 — portfolio orchestration (max 1 active paper position)
live-trader.portfolio.queue-ttl-minutes=15
live-trader.portfolio.queue-min-dominance=100

# Phase 202 — discretionary PUT assist (no auto short execution)
live-trader.bearish-assist-mode=LONG_PLUS_PUT_ASSIST
live-trader.put-assist.min-bias=72
live-trader.put-assist.min-rvol=1.2

# Phase 211 — premarket intelligence (9:00–9:30 ET context only; no PM execution)
session.premarket.enabled=true
session.premarket.telemetry-enabled=true

# Phase 212 — data integrity & execution safety
live.integrity.max-stale-seconds=10
live.integrity.max-delayed-seconds=20
live.integrity.max-candle-gap=1
live.integrity.recovery-stabilization-candles=2
live.integrity.health-poll-ms=5000
live.recovery.backfill-minutes=30
live.recovery.partial-rebuild-minutes=60

# Phase 191 — streaming live runtime (no continuous scanner hydration)
live-runtime.research-hydration-enabled=false
live-runtime.bootstrap-enabled=true
live-runtime.bootstrap-refresh-minutes=45

# Phase 193 — replay / JPA slow query diagnostics
spring.jpa.properties.hibernate.session.events.log.LOG_QUERIES_SLOWER_THAN_MS=250
logging.level.org.hibernate.SQL_SLOW=WARN
spring.jpa.show-sql=false
