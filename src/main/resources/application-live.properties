# Phase 221 — LIVE runtime (iPhone / manual assist / live IBKR data)
server.port=8080
spring.application.name=trading-signal-backend-live

runtime.profile=LIVE
runtime.execution-mode=MANUAL_ASSIST
runtime.integrity-mode=STRICT

ibkr.host=127.0.0.1
ibkr.port=4001
ibkr.clientId=201
ibkr.client-id-auto-offset=false
ibkr.market-data-type=1
ibkr.max-live-streams=40

live-trader.execution-mode=MANUAL_ASSIST
live-trader.auto-paper-enabled=false
live-trader.live-execution-enabled=false

paper-execution.research.enabled=false
paper-execution.intelligence-enabled=false

live.integrity.max-stale-seconds=10
live.integrity.max-delayed-seconds=20

ibkr.stream.dynamic-enabled=true
ibkr.stream.reconcile-interval-ms=30000
ibkr.stream.verify-timeout-seconds=45
ibkr.stream.stale-seconds=60
ibkr.stream.dead-seconds=120
ibkr.stream.auto-recover=true

live-runtime.research-hydration-enabled=false
live-runtime.bootstrap-enabled=true

live-trader.bearish-assist-mode=LONG_PLUS_PUT_ASSIST
live-trader.put-assist.min-bias=72
live-trader.put-assist.min-rvol=1.2

tradingview.stale-minutes=15
tradingview.throttle-seconds=60
