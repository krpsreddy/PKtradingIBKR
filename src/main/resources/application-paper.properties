# Phase 221 — PAPER runtime (Android / auto paper / delayed data)
server.port=8180
spring.application.name=trading-signal-backend-paper

runtime.profile=PAPER
runtime.execution-mode=AUTO_PAPER
runtime.integrity-mode=DELAYED_TOLERANT

ibkr.host=127.0.0.1
ibkr.port=4002
ibkr.clientId=101
ibkr.client-id-auto-offset=false
ibkr.market-data-type=3
ibkr.max-live-streams=40

live-trader.execution-mode=AUTO_PAPER
live-trader.auto-paper-enabled=true
live-trader.live-execution-enabled=false

paper-execution.research.enabled=true
paper-execution.intelligence-enabled=true
paper-execution.simulated-fills-only=true

live.integrity.max-stale-seconds=90
live.integrity.max-delayed-seconds=1200

ibkr.stream.dynamic-enabled=true
ibkr.stream.reconcile-interval-ms=30000
ibkr.stream.verify-timeout-seconds=45
ibkr.stream.stale-seconds=120
ibkr.stream.dead-seconds=300
ibkr.stream.auto-recover=true

live-runtime.research-hydration-enabled=false
live-runtime.bootstrap-enabled=true

tradingview.stale-minutes=15
tradingview.throttle-seconds=60
