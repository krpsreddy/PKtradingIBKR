spring.application.name=trading-signal-backend
server.port=8080

spring.config.import=optional:classpath:application-local.properties

logging.level.root=INFO
logging.level.com.tradingbot=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:trading_signals}
spring.datasource.username=${DB_USERNAME:${USER:pk}}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

ibkr.host=127.0.0.1
ibkr.port=7497
ibkr.clientId=1
ibkr.symbol=NVDA
ibkr.market-data-type=3

telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}

# 5-minute intraday momentum engine
trading.timeframe=5MIN
trading.candle-minutes=5
trading.candle-history-size=5000
trading.historical-lookback-days=60
trading.ibkr-historical-duration=60 D
trading.candle-retention-days=90
trading.intelligence-lookback-days=60
trading.min-candles-for-signals=50
trading.avg-volume-period=20
trading.signal-dedupe-minutes=15
trading.active-signal-minutes=5
trading.symbol-idle-evict-minutes=30
trading.eviction-check-ms=300000
trading.market-trend-symbols=SPY,QQQ
trading.open-mom-min-bar-volume=100000
trading.open-mom-min-avg-daily-volume=500000
trading.open-scout-eval-interval-ms=3000
trading.open-scout-min-live-volume=50000
trading.mom-pull-min-confidence=4
trading.mom-pull-midday-min-confidence=5
trading.mom-pull-late-day-min-confidence=5
trading.mom-pull-min-hold-bars=2
trading.mom-pull-exit-min-signals=2
trading.mom-pull-prior-impulse-pct=0.015
trading.mom-pull-chop-range-pct=0.008
trading.mom-pull-min-rvol-pull=1.3
trading.mom-pull-min-rvol-mom=1.5
trading.mom-pull-impulse-lookback-bars=6
trading.mom-pull-mom-impulse-lookback-bars=12
trading.mom-pull-mom-impulse-min-body-pct=0.008
trading.replay-min-candles=20
trading.open-fail-break-end=10:15
trading.cont-breakout-min-rvol=1.5
trading.recovery-fail-min-rally-pct=0.03
trading.recovery-fail-max-rally-pct=0.10
trading.recovery-fail-min-drawdown-pct=0.02
trading.recovery-fail-min-rvol=1.3
trading.recovery-fail-session-low-buffer=0.01
trading.recovery-fail-bearish-bars=3
trading.recovery-fail-rally-lookback-bars=12
trading.recovery-fail-peak-max-age-bars=6
trading.recovery-fail-window-end=15:00
trading.open-fail-selloff-min-body-pct=0.55
trading.open-fail-max-lower-wick-pct=0.40
trading.imbalance-min-gap-pct=0.002
trading.imbalance-impulse-min-body-pct=0.55
trading.imbalance-max-wick-pct=0.35
trading.imbalance-min-impulse-range-pct=0.008
trading.imbalance-min-rvol=1.0
trading.extended-max-ema9-dist-pct=0.04
trading.extended-max-vwap-dist-pct=0.05
trading.extended-vertical-move-pct=0.06
trading.extended-vertical-lookback-bars=20
trading.regime-chop-range-pct=0.008

# AI reasoning layer (Phase 131)
ai.enabled=true
ai.provider=ollama
ai.cache-ttl-ms=12000
ai.ollama.base-url=http://localhost:11434
ai.ollama.model=qwen2.5:7b
ai.ollama.timeout-ms=8000
ai.openai.enabled=false
ai.openai.api-key=
ai.openai.model=gpt-5-nano
ai.openai.base-url=https://api.openai.com/v1

# Phase 181 — paper execution research (enabled only with spring.profiles.active=evolution)
paper-execution.research.enabled=false
paper-execution.fixed-quantity=1
paper-execution.order-type=MKT
paper-execution.dedupe-minutes=30
ibkr.paper-port=7497
ibkr.live-port=7496
ibkr.paper-gateway-port=4002
ibkr.live-gateway-port=4001
